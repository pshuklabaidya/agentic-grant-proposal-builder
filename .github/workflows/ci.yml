name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Run evaluation harness
        run: python -m agentic_grant_proposal_builder.evaluation

      - name: Run version consistency check
        run: python scripts/check_version.py

      - name: Run dependency audit report
        run: python scripts/dependency_audit.py

      - name: Run repository health report
        run: python scripts/repo_health.py

      - name: Run Streamlit smoke test
        run: python scripts/smoke_streamlit.py

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports-python-${{ matrix.python-version }}
          path: reports/
